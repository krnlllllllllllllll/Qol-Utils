name: Build & Release Geode Mod

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
  schedule:
    - cron: "0 3 * * *" # Nightly build at 03:00 UTC

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        config:
          - name: Windows
            os: windows-latest
            flags: "/DPLATFORM_WINDOWS"
          - name: macOS
            os: macos-latest
            flags: "-DPLATFORM_MACOS"
          - name: Android32
            os: ubuntu-latest
            target: Android32
            flags: "-DPLATFORM_ANDROID32"
          - name: Android64
            os: ubuntu-latest
            target: Android64
            flags: "-DPLATFORM_ANDROID64"

    name: ${{ matrix.config.name }}
    runs-on: ${{ matrix.config.os }}

    env:
      GEODE_VERSION: "5.7.1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache build
        uses: actions/cache@v4
        with:
          path: |
            build
            .cache
          key: ${{ runner.os }}-geode-${{ matrix.config.name }}-${{ hashFiles('CMakeLists.txt', 'mod.json') }}
          restore-keys: |
            ${{ runner.os }}-geode-${{ matrix.config.name }}-

      - name: Auto-increment mod version
        run: |
          python .github/scripts/bump_version.py mod.json
        shell: bash

      - name: CI validation (editor features)
        run: |
          python .github/scripts/validate_editor_features.py
        shell: bash

      - name: Build Geode mod
        uses: geode-sdk/build-geode-mod@main
        with:
          target: ${{ matrix.config.target }}
          geode-version: ${{ env.GEODE_VERSION }}
          cmake-flags: ${{ matrix.config.flags }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.config.name }}-mod
          path: |
            build/*.geode
            build/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: dist/**/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
